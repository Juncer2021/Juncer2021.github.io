<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>今天吃什么 - ZJU</title>
    <style>
        :root {
            --bg: #f5f0eb;
            --card-bg: rgba(255, 255, 255, 0.78);
            --text: #3d3226;
            --accent: #e07a3d;
            --accent-hover: #c96a32;
            --blue: #5a7f8f;
            --green: #5a8f6b;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
            --tag-bg: rgba(224, 122, 61, 0.1);
            --drink-tag-bg: rgba(90, 127, 143, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #fdf6ee 0%, #f2e6d9 30%, #fae8d5 60%, #fef9f3 100%);
            background-attachment: fixed;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
            position: relative;
            overflow-x: hidden;
        }

        /* ====== 封面 ====== */
        .cover {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 24px;
            background: linear-gradient(135deg, #fdf6ee 0%, #f2e6d9 30%, #fae8d5 60%, #fef9f3 100%);
            z-index: 100;
            cursor: pointer;
            transition: opacity 0.5s ease, transform 0.5s ease;
            padding: 40px 20px;
        }

        .cover.hide {
            opacity: 0;
            pointer-events: none;
            transform: scale(1.05);
        }

        .cover-img {
            width: 90%;
            max-width: 400px;
            border-radius: 16px;
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.15);
            animation: coverFloat 4s ease-in-out infinite;
            transition: transform 0.3s ease;
        }

        .cover:hover .cover-img {
            transform: scale(1.02);
        }

        .cover-hint {
            color: #b5a190;
            font-size: 0.9rem;
            font-weight: 500;
            animation: hintPulse 2s ease-in-out infinite;
        }

        @keyframes coverFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        @keyframes hintPulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        /* ====== 主界面 ====== */
        .container {
            position: relative;
            z-index: 1;
            width: 90%;
            max-width: 520px;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 36px 28px 28px;
            box-shadow: var(--shadow);
            border: 1px solid rgba(255, 255, 255, 0.6);
            text-align: center;
        }

        .title {
            font-size: 1.7rem;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 4px;
        }

        .subtitle {
            font-size: 0.85rem;
            color: #9b8c7c;
            margin-bottom: 24px;
        }

        /* 校区选择 */
        .campus-select {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            justify-content: center;
            margin-bottom: 16px;
        }

        .campus-btn {
            padding: 6px 14px;
            border-radius: 50px;
            border: 1.5px solid #d5ccc0;
            background: rgba(255, 255, 255, 0.4);
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 500;
            color: #8b7c6b;
            transition: all 0.2s;
            font-family: inherit;
        }

        .campus-btn:hover {
            border-color: var(--green);
            color: var(--green);
        }

        .campus-btn.active {
            background: var(--green);
            color: #fff;
            border-color: var(--green);
        }

        /* 食堂选择 */
        .canteen-select {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin-bottom: 24px;
        }

        .canteen-btn {
            padding: 10px 20px;
            border-radius: 50px;
            border: 2px solid #e0d5c5;
            background: rgba(255, 255, 255, 0.5);
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 500;
            color: #6b5e4f;
            transition: all 0.2s;
            font-family: inherit;
        }

        .canteen-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .canteen-btn.active {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
        }

        /* 类型切换 */
        .type-toggle {
            display: flex;
            gap: 0;
            margin-bottom: 28px;
            border-radius: 50px;
            overflow: hidden;
            border: 2px solid #e0d5c5;
            width: fit-content;
            margin-left: auto;
            margin-right: auto;
        }

        .type-btn {
            padding: 10px 24px;
            border: none;
            background: transparent;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 500;
            color: #6b5e4f;
            transition: all 0.2s;
            font-family: inherit;
        }

        .type-btn.food-active {
            background: var(--accent);
            color: #fff;
        }

        .type-btn.drink-active {
            background: var(--blue);
            color: #fff;
        }

        /* 结果展示 */
        .result-area {
            min-height: 130px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin-bottom: 12px;
            gap: 6px;
        }

        .result-name {
            font-size: 2rem;
            font-weight: 700;
            color: var(--accent);
            transition: all 0.3s ease;
            line-height: 1.3;
        }

        .result-name.drink-color {
            color: var(--blue);
        }

        .result-name.spinning {
            animation: slotSpin 0.5s ease-in-out;
        }

        .result-name.show {
            animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .result-meta {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
            justify-content: center;
            font-size: 0.85rem;
        }

        .area-tag {
            background: var(--tag-bg);
            color: var(--accent);
            padding: 3px 12px;
            border-radius: 20px;
            font-weight: 500;
            font-size: 0.8rem;
        }

        .area-tag.drink-tag {
            background: var(--drink-tag-bg);
            color: var(--blue);
        }

        .price-tag {
            color: #c5553a;
            font-weight: 700;
            font-size: 1.1rem;
        }

        .price-tag.drink-price {
            color: var(--blue);
        }

        .score-tag {
            background: rgba(90, 143, 107, 0.1);
            color: var(--green);
            padding: 3px 12px;
            border-radius: 20px;
            font-weight: 500;
            font-size: 0.8rem;
        }

        .placeholder-text {
            font-size: 1rem;
            color: #bfb8ae;
        }

        @keyframes slotSpin {
            0% {
                transform: translateY(0);
                opacity: 1;
            }
            30% {
                transform: translateY(-12px);
                opacity: 0;
            }
            60% {
                transform: translateY(12px);
                opacity: 0.3;
            }
            100% {
                transform: translateY(0);
                opacity: 1;
            }
        }

        @keyframes popIn {
            0% {
                transform: scale(0.4);
                opacity: 0;
            }
            70% {
                transform: scale(1.06);
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 按钮区 */
        .btn-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .hidden {
            display: none !important;
        }

        .btn {
            display: inline-block;
            padding: 14px 48px;
            font-size: 1.05rem;
            font-weight: 600;
            color: #fff;
            background: var(--accent);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.25s ease;
            letter-spacing: 0.03em;
            box-shadow: 0 4px 16px rgba(224, 122, 61, 0.3);
            font-family: inherit;
        }

        .btn:hover {
            background: var(--accent-hover);
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(224, 122, 61, 0.4);
        }

        .btn:active {
            transform: translateY(0) scale(0.97);
        }

        .btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        /* 操作按钮：吃 / 换一个 */
        .action-buttons {
            display: flex;
            gap: 12px;
            justify-content: center;
            animation: fadeInUp 0.3s ease;
        }

        .btn-eat {
            padding: 12px 28px;
            font-size: 1rem;
            font-weight: 600;
            color: #fff;
            background: var(--green);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.25s ease;
            box-shadow: 0 4px 16px rgba(90, 143, 107, 0.3);
            font-family: inherit;
        }

        .btn-eat:hover {
            background: #4a7d5b;
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(90, 143, 107, 0.4);
        }

        .btn-eat:active {
            transform: translateY(0) scale(0.97);
        }

        .btn-skip {
            padding: 12px 28px;
            font-size: 1rem;
            font-weight: 500;
            color: #8b7c6b;
            background: rgba(255, 255, 255, 0.5);
            border: 2px solid #e0d5c5;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.25s ease;
            font-family: inherit;
        }

        .btn-skip:hover {
            border-color: #c5b5a0;
            color: #6b5e4f;
            transform: translateY(-2px);
        }

        .btn-skip:active {
            transform: translateY(0) scale(0.97);
        }

        /* 统计 */
        .stats {
            font-size: 0.78rem;
            color: #b5a99b;
            margin-top: 14px;
        }

        @media (max-width: 500px) {
            .card {
                padding: 24px 16px;
                border-radius: 18px;
            }
            .title {
                font-size: 1.4rem;
            }
            .result-name {
                font-size: 1.6rem;
            }
            .btn {
                padding: 12px 32px;
                font-size: 0.95rem;
            }
            .btn-eat,
            .btn-skip {
                padding: 10px 22px;
                font-size: 0.9rem;
            }
            .canteen-btn {
                padding: 8px 14px;
                font-size: 0.8rem;
            }
            .cover-img {
                max-width: 300px;
            }
        }
    </style>
</head>

<body>

    <!-- 封面 -->
    <div class="cover" id="cover" onclick="enterApp()">
        <img class="cover-img" src="https://gitee.com/Juncer2021/img-bed/raw/master/images/5e63b14581cc158eaaac8ad84a1f6df6.png" alt="">
        <span class="cover-hint">点 击 进 入</span>
    </div>

    <!-- 主界面 -->
    <div class="container">
        <div class="card">
            <div class="title">今天吃什么</div>
            <div class="subtitle" id="canteen-name">紫金港 · 大食堂</div>

            <!-- 校区选择 -->
            <div class="campus-select" id="campus-select"></div>

            <!-- 食堂选择 -->
            <div class="canteen-select" id="canteen-select"></div>

            <!-- 区域筛选 -->
            <div class="canteen-select" id="area-select"></div>

            <!-- 饭菜/饮品切换 -->
            <div class="type-toggle">
                <button class="type-btn food-active" id="btn-food" onclick="switchType('food')">饭菜</button>
                <button class="type-btn" id="btn-drink" onclick="switchType('drinks')">饮品</button>
            </div>

            <!-- 结果展示 -->
            <div class="result-area" id="result-area">
                <span id="result-name" class="placeholder-text">点击按钮开始</span>
                <div class="result-meta" id="result-meta"></div>
            </div>

            <!-- 按钮区 -->
            <div class="btn-area">
                <button class="btn" id="btn-random" onclick="pickFood()">
                    随机一下
                </button>
                <div class="action-buttons hidden" id="action-buttons">
                    <button class="btn-eat" onclick="eatThis()">就吃这个</button>
                    <button class="btn-skip" onclick="skipThis()">换一个</button>
                </div>
            </div>

            <div class="stats" id="stats"></div>
        </div>
    </div>

    <script src="data.js"></script>
    <script>
        // ==================== 封面过渡 ====================
        function enterApp() {
            const cover = document.getElementById("cover");
            cover.classList.add("hide");
            setTimeout(() => cover.remove(), 500);
        }

        // ==================== 推荐值系统 ====================
        const STORAGE_KEY = "canteen_scores";
        const MAX_SCORE_BONUS = 4; // 最大额外权重，避免单一菜品垄断

        function loadScores() {
            try {
                const raw = localStorage.getItem(STORAGE_KEY);
                return raw ? JSON.parse(raw) : {};
            } catch (e) {
                return {};
            }
        }

        function saveScores(scores) {
            try {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(scores));
            } catch (e) {
                // localStorage 不可用时静默降级
            }
        }

        function getScoreKey(item) {
            return currentCampus + "::" + currentCanteen + "::" + item.name;
        }

        function getItemScore(item) {
            const scores = loadScores();
            return scores[getScoreKey(item)] || 0;
        }

        function incrementScore(item) {
            const scores = loadScores();
            const key = getScoreKey(item);
            scores[key] = (scores[key] || 0) + 1;
            saveScores(scores);
        }

        // 权重 = 1 + min(score, MAX_SCORE_BONUS)
        // 新菜品权重为 1，推荐 ≥4 次后封顶权重 5
        function getWeight(item) {
            return 1 + Math.min(getItemScore(item), MAX_SCORE_BONUS);
        }

        // 加权随机选择，返回索引
        function weightedRandomIndex(list) {
            if (list.length === 0) return -1;
            const weights = list.map(item => getWeight(item));
            const totalWeight = weights.reduce((sum, w) => sum + w, 0);
            let random = Math.random() * totalWeight;
            for (let i = 0; i < list.length; i++) {
                random -= weights[i];
                if (random <= 0) return i;
            }
            return list.length - 1;
        }

        // ==================== 主逻辑 ====================
        let currentCampus = "紫金港校区";
        let currentCanteen = "大食堂";
        let currentType = "food";
        let currentArea = "全部";
        let isSpinning = false;
        let lastResultName = "";
        let currentResult = null;

        const resultNameEl = document.getElementById("result-name");
        const resultMetaEl = document.getElementById("result-meta");
        const btnRandom = document.getElementById("btn-random");
        const canteenNameEl = document.getElementById("canteen-name");
        const actionButtonsEl = document.getElementById("action-buttons");

        function hideActionButtons() {
            actionButtonsEl.classList.add("hidden");
        }

        function showActionButtons() {
            actionButtonsEl.classList.remove("hidden");
        }

        // 初始化校区按钮
        function initCampusButtons() {
            const container = document.getElementById("campus-select");
            const campuses = Object.keys(CANTEEN_DATA);
            container.innerHTML = campuses.map(name => {
                const short = name.replace("校区", "");
                const active = name === currentCampus ? " active" : "";
                return `<button class="campus-btn${active}" onclick="selectCampus('${name}')">${short}</button>`;
            }).join("");
        }

        function selectCampus(name) {
            currentCampus = name;
            const campusCanteens = CANTEEN_DATA[name];
            const first = Object.keys(campusCanteens)[0] || null;
            currentCanteen = first;
            currentArea = "全部";
            updateSubtitle();
            resetResult();
            initCampusButtons();
            initCanteenButtons();
            initAreaButtons();
            updateStats();
        }

        // 初始化食堂按钮
        function initCanteenButtons() {
            const container = document.getElementById("canteen-select");
            const canteens = Object.keys(CANTEEN_DATA[currentCampus] || {});
            if (canteens.length === 0) {
                container.innerHTML = '<span style="color:#bfb8ae;font-size:0.85rem;">暂无食堂数据</span>';
                return;
            }
            container.innerHTML = canteens.map(name => {
                const active = name === currentCanteen ? " active" : "";
                return `<button class="canteen-btn${active}" onclick="selectCanteen('${name}')">${name}</button>`;
            }).join("");
        }

        function updateSubtitle() {
            const short = currentCampus.replace("校区", "");
            canteenNameEl.textContent = `${short} · ${currentCanteen}`;
        }

        function selectCanteen(name) {
            currentCanteen = name;
            updateSubtitle();
            currentArea = "全部";
            resetResult();
            initCanteenButtons();
            initAreaButtons();
            updateStats();
        }

        function initAreaButtons() {
            const container = document.getElementById("area-select");
            const campus = CANTEEN_DATA[currentCampus];
            if (!campus) { container.innerHTML = ""; return; }
            const canteen = campus[currentCanteen];
            if (!canteen) { container.innerHTML = ""; return; }
            const areas = new Set();
            canteen.food.forEach(item => areas.add(item.area));
            canteen.drinks.forEach(item => areas.add(item.area));
            const areaList = ["全部", ...([...areas].sort())];
            container.innerHTML = areaList.map(name => {
                const active = name === currentArea ? " active" : "";
                return `<button class="canteen-btn${active}" onclick="selectArea('${name}')">${name === '全部' ? '全部' : name}</button>`;
            }).join("");
        }

        function selectArea(name) {
            currentArea = name;
            resetResult();
            initAreaButtons();
            updateStats();
        }

        function switchType(type) {
            currentType = type;
            document.getElementById("btn-food").className = type === "food" ? "type-btn food-active" : "type-btn";
            document.getElementById("btn-drink").className = type === "drinks" ? "type-btn drink-active" : "type-btn";
            resetResult();
            updateStats();
        }

        function resetResult() {
            currentResult = null;
            lastResultName = "";
            resultNameEl.textContent = "点击按钮开始";
            resultNameEl.className = "placeholder-text";
            resultMetaEl.innerHTML = "";
            hideActionButtons();
            btnRandom.classList.remove("hidden");
            btnRandom.disabled = false;
        }

        function getCurrentList() {
            const campus = CANTEEN_DATA[currentCampus];
            if (!campus) return [];
            const canteen = campus[currentCanteen];
            if (!canteen) return [];
            let list = currentType === "food" ? canteen.food : canteen.drinks;
            if (currentArea !== "全部") {
                list = list.filter(item => item.area === currentArea);
            }
            return list;
        }

        function pickFood() {
            if (isSpinning) return;
            const list = getCurrentList();
            if (list.length === 0) {
                resultNameEl.textContent = "暂无数据";
                resultNameEl.className = "result-name show";
                resultMetaEl.innerHTML = "";
                return;
            }

            isSpinning = true;
            btnRandom.disabled = true;
            btnRandom.classList.add("hidden");
            hideActionButtons();
            resultMetaEl.innerHTML = "";

            // 加权随机选（避免连续重复）
            let index;
            do {
                index = weightedRandomIndex(list);
            } while (list[index].name === lastResultName && list.length > 1);

            lastResultName = list[index].name;

            // 转盘动画
            const spinInterval = 60;
            const totalSpins = 15;
            let spinCount = 0;
            let spinTimer;

            function spinTick() {
                const randomItem = list[Math.floor(Math.random() * list.length)];
                resultNameEl.textContent = randomItem.name;
                const spinClass = currentType === "drinks" ? "result-name drink-color spinning" : "result-name spinning";
                resultNameEl.className = spinClass;
                spinCount++;
                if (spinCount >= totalSpins) {
                    clearInterval(spinTimer);
                    showResult(list[index]);
                }
            }
            spinTimer = setInterval(spinTick, spinInterval);
            spinTick();
        }

        function showResult(item) {
            currentResult = item;
            const isDrink = currentType === "drinks";
            const score = getItemScore(item);

            resultNameEl.textContent = item.name;
            resultNameEl.className = isDrink ? "result-name drink-color show" : "result-name show";

            resultMetaEl.innerHTML = `
                <span class="area-tag${isDrink ? ' drink-tag' : ''}">${item.area}</span>
                <span class="price-tag${isDrink ? ' drink-price' : ''}">${item.price}</span>
                <span class="score-tag">推荐度 ${score}</span>
            `;

            isSpinning = false;
            showActionButtons();
        }

        function eatThis() {
            if (!currentResult) return;
            incrementScore(currentResult);
            const isDrink = currentType === "drinks";

            // 短暂反馈
            resultNameEl.className = isDrink ? "result-name drink-color" : "result-name";
            resultMetaEl.innerHTML = `
                <span style="color:var(--green);font-weight:600;">✅ 已记录！下次更容易抽到哦</span>
            `;
            hideActionButtons();

            setTimeout(() => {
                currentResult = null;
                lastResultName = "";
                resultNameEl.textContent = "点击按钮开始";
                resultNameEl.className = "placeholder-text";
                resultMetaEl.innerHTML = "";
                btnRandom.classList.remove("hidden");
                btnRandom.disabled = false;
                updateStats();
            }, 1500);
        }

        function skipThis() {
            hideActionButtons();
            // 直接重新 roll，不显示随机按钮
            setTimeout(() => pickFood(), 100);
        }

        function updateStats() {
            const list = getCurrentList();
            const scores = loadScores();
            let scoredCount = 0;
            list.forEach(item => {
                if (scores[getScoreKey(item)] > 0) scoredCount++;
            });
            let text = `当前可选：${list.length} 种`;
            if (scoredCount > 0) {
                text += ` · 已推荐：${scoredCount} 种`;
            }
            document.getElementById("stats").textContent = text;
        }

        // 键盘支持（操作按钮显示时不触发随机）
        document.addEventListener("keydown", (e) => {
            if (e.code === "Space" || e.code === "Enter") {
                if (!actionButtonsEl.classList.contains("hidden")) return;
                e.preventDefault();
                pickFood();
            }
        });

        // 启动
        initCampusButtons();
        initCanteenButtons();
        initAreaButtons();
        updateStats();
    </script>
